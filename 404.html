<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; URL='https://polishup.online/'" />
    <script>
      // Dodatkowy JS redirect dla przeglądarek, które ignorują meta refresh
      window.location.href = "https://polishup.online/";

  </head>
  <body>
    <p>If you are not redirected automatically, <a href="https://polishup.online/">click here</a>.</p>
  </body>
</html>
