<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 – Page not found | PolishUp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Arial, sans-serif;
      background: #ffffff;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 560px;
      padding: 24px;
    }

    h1 {
      font-size: 90px;
      margin: 0;
      font-weight: 800;
      letter-spacing: -2px;
    }

    h2 {
      margin-top: 10px;
      font-size: 22px;
      font-weight: 600;
    }

    p {
      margin-top: 12px;
      font-size: 16px;
      color: #555;
      line-height: 1.5;
    }

    .buttons {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 15px;
      transition: 0.2s ease;
      display: inline-block;
    }

    .btn-primary {
      background: #000;
      color: #fff;
    }

    .btn-primary:hover {
      background: #333;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f2f2f2;
      color: #111;
    }

    .btn-secondary:hover {
      background: #e6e6e6;
      transform: translateY(-1px);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>404</h1>
    <h2>Page not found</h2>
    

    <p>
      This page doesn’t exist anymore or the link is broken. Let’s get you back to learning Polish 🇵🇱
    </p>

    <div class="buttons">
      <a href="https://polishup.online/" class="btn btn-secondary">
        Go to Polish Up Online
      </a>

      <a href="https://polishup.online/free-polish-lesson.html" class="btn btn-primary">
        Book a free demo
      </a>
    </div>
  </div>

</body>
</html>
